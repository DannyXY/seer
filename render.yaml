services:
  - type: web
    name: seer-api
    runtime: docker
    plan: starter
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_ROLE
        value: api
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: seer-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: seer-redis
          property: connectionString

  - type: worker
    name: seer-worker
    runtime: docker
    plan: starter
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_ROLE
        value: worker
      - key: DATABASE_URL
        fromDatabase:
          name: seer-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: seer-redis
          property: connectionString

  - type: redis
    name: seer-redis
    plan: starter
    ipAllowList: []

databases:
  - name: seer-postgres
    plan: starter
