x-backend-env: &backend-env
  - key: APP_ENV
    value: production
  - key: DATABASE_URL
    fromDatabase:
      name: seer-postgres
      property: connectionString
  - key: REDIS_URL
    fromService:
      type: redis
      name: seer-redis
      property: connectionString
  - key: RUN_MIGRATIONS
    value: false
  - key: DEFILLAMA_ENABLED
    value: true
  - key: NANSEN_SMART_MONEY_CHAINS
    value: ethereum,solana,base
  - key: MANTLE_CHAIN_ID
    value: 5003
  - key: MANTLE_RPC_URL
    sync: false
  - key: AA_PROVIDER_STACK
    value: safe-4337-relay-kit
  - key: CLAUDE_API_KEY
    sync: false
  - key: NANSEN_API_KEY
    sync: false
  - key: AA_BUNDLER_URL
    sync: false
  - key: AA_ENTRY_POINT_ADDRESS
    sync: false
  - key: AA_PAYMASTER_URL
    sync: false
  - key: BACKEND_SIGNER_PRIVATE_KEY
    sync: false
  - key: MANTLE_USDC_ADDRESS
    sync: false
  - key: MANTLE_USDT_ADDRESS
    sync: false
  - key: MANTLE_MNT_ADDRESS
    sync: false
  - key: MANTLE_METH_ADDRESS
    sync: false
  - key: SEER_APPROVED_STRATEGY_ADDRESS
    sync: false
  - key: SEER_APPROVED_STRATEGY_SPENDER_ADDRESS
    sync: false
  - key: SEER_STRATEGY_DEPOSIT_FUNCTION
    value: deposit(address,uint256)
  - key: SEER_MERCHANT_MOE_STRATEGY_ADDRESS
    sync: false
  - key: SEER_MERCHANT_MOE_SPENDER_ADDRESS
    sync: false
  - key: SEER_MERCHANT_MOE_DEPOSIT_FUNCTION
    sync: false
  - key: SEER_LENDLE_STRATEGY_ADDRESS
    sync: false
  - key: SEER_LENDLE_SPENDER_ADDRESS
    sync: false
  - key: SEER_LENDLE_DEPOSIT_FUNCTION
    value: deposit(address,uint256,address,uint16)
  - key: SEER_AGNI_STRATEGY_ADDRESS
    sync: false
  - key: SEER_AGNI_SPENDER_ADDRESS
    sync: false
  - key: SEER_AGNI_DEPOSIT_FUNCTION
    sync: false
  - key: SEER_METH_STRATEGY_ADDRESS
    sync: false
  - key: SEER_METH_SPENDER_ADDRESS
    sync: false
  - key: SEER_METH_DEPOSIT_FUNCTION
    sync: false
  - key: SEER_ARENA_POINTS_ADDRESS
    sync: false
  - key: SEER_PREDICTION_REGISTRY_ADDRESS
    sync: false
  - key: SEER_IDENTITY_SBT_ADDRESS
    sync: false
  - key: SEER_INTENT_REGISTRY_ADDRESS
    sync: false

services:
  - type: web
    name: seer-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: seer-api
          property: hostURL
      - key: VITE_API_BASE
        fromService:
          type: web
          name: seer-api
          property: hostURL
      - key: VITE_PRIVY_APP_ID
        value: cmq471x3900dv0bl7l3h6qwvw
      - key: VITE_PIMLICO_API_KEY
        sync: false

  - type: web
    name: seer-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - <<: *backend-env
      - key: APP_ROLE
        value: api
      - key: PORT
        value: 10000
      - key: RUN_INTERNAL_JOBS
        value: false

  - type: worker
    name: seer-worker
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - <<: *backend-env
      - key: APP_ROLE
        value: worker

  - type: redis
    name: seer-redis
    plan: free
    ipAllowList: []

databases:
  - name: seer-postgres
    plan: basic-256mb
