      #root {
        min-height: 100vh;
      }
      .seer-toast {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--ink);
        color: var(--paper);
        font-size: 13.5px;
        padding: 12px 18px;
        border-radius: 99px;
        box-shadow: var(--sh-pop);
        z-index: 300;
        animation: fadeUp 0.3s var(--ease-out) both;
      }
    </style>
